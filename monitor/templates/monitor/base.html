<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SmartSense — Industrial Monitor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-0: #0a0e1a;
      --bg-1: #111827;
      --bg-2: #1e293b;
      --bg-3: #334155;
      --border: #1f2937;
      --text-0: #f1f5f9;
      --text-1: #cbd5e1;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --orange: #f97316;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-0);
      color: var(--text-0);
      min-height: 100vh;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ---- Top bar ---- */
    .topbar {
      background: var(--bg-1);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-link {
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--text-0); }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8125rem;
      color: var(--text-2);
      padding: 6px 12px;
      background: var(--bg-2);
      border-radius: 100px;
      border: 1px solid var(--border);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
    }

    /* ---- Main ---- */
    .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .page-header { margin-bottom: 1.5rem; }
    .page-title { font-size: 1.25rem; font-weight: 600; color: var(--text-0); margin-bottom: 4px; }
    .page-subtitle { font-size: 0.875rem; color: var(--text-2); }

    /* ---- Cards ---- */
    .card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--bg-3); }

    /* ---- Severity badges ---- */
    .sev-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .sev-1, .sev-2 { background: rgba(34, 197, 94, 0.15); color: #86efac; }
    .sev-3 { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
    .sev-4 { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
    .sev-5 { background: rgba(239, 68, 68, 0.25); color: #fecaca; }

    /* ---- Footer ---- */
    .footer {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      font-size: 0.8125rem;
      color: var(--text-3);
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-2);
      color: var(--text-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--bg-3); color: var(--text-0); }
    .btn-primary { background: var(--accent); color: var(--bg-0); border-color: var(--accent); }
    .btn-primary:hover { background: #0ea5e9; color: var(--bg-0); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<div class="topbar">
  <a href="/" style="text-decoration:none;" class="logo">
    <div class="logo-icon">⚡</div>
    <span>SmartSense</span>
  </a>
  <div class="topbar-right">
    <a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a>
    <a href="{% url 'anomaly_list' %}" class="nav-link">All Anomalies</a>
    <a href="{% url 'export_csv' %}" class="nav-link">Export CSV</a>
    <div class="status">
      <div class="dot"></div>
      <span>Live · Agent Active</span>
    </div>
  </div>
</div>

<div class="main">
  {% block content %}{% endblock %}
</div>

<div class="footer">
  SmartSense · Smart Home HVAC Anomaly Detection & Diagnosis Agent · Built with Django + Scikit-learn + Gemini API
</div>

{% block extra_scripts %}{% endblock %}
</body>
</html>
